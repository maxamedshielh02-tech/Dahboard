<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Settings Page</title>
    <style>
      
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .settings-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: auto;
            border: 1px solid #c8e6c9;
        }

             .settings-header {
            background-color:#34495e;
            color: white;
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 5px;
            text-align: center;
        }

        .profile-settings h3 {
            margin-bottom: 15px;
            color: #333;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Si ay ula jaanqaado cabirka */
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #000000;
        }
    </style>
</head>
<body>

    <div class="settings-container">
        <div class="settings-header">
            <h1>Settings</h1>
        </div>
        
        <div class="profile-settings">
            <h3>Profile Settings</h3>
            <form>
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Your username">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Your email address">

                <label for="theme">Theme</label>
                <select id="theme">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>

                <button type="submit">Save Settings</button>
            </form>
        </div>
    </div>

</body>
</html>
