<!DOCTYPE html>
<html>
<head>
    <title>Student Information</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:30px;
        }

        .header{
            background:#34495e;
            color:white;
            text-align:center;
            padding:20px;
            font-size:30px;
            font-weight:bold;
            border-radius:8px;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#5dade2;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        img{
            width:50px;
            height:50px;
            border-radius:50%;
        }

        .edit{
            background:green;
            color:white;
            padding:8px 15px;
            border:none;
            border-radius:5px;
        }

        .delete{
            background:red;
            color:white;
            padding:8px 15px;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="header">
    Student Information Dashboard
</div>

<table>
    <tr>
        <th>Photo</th>
        <th>Name</th>
        <th>ID</th>
        <th>Location</th>
        <th>Status</th>
        <th>Gender</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>
